<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Korean Vocabulary Type-in Quiz</title>

    <style>
        body { font-family: 'Pyidaungsu', sans-serif; background:#f0f2f5; display:flex; justify-content:center; padding:20px; }
        .quiz-box { background:white; padding:30px; border-radius:15px; box-shadow:0 10px 25px rgba(0,0,0,0.1); width:100%; max-width:450px; text-align:center; border-top:5px solid #0088cc; }
        input { width:80%; padding:12px; margin:15px 0; border:2px solid #ddd; border-radius:8px; text-align:center; font-size: 16px; }
        button { background:#007bff; color:white; border:none; padding:12px; border-radius:8px; width:100%; margin-top:10px; font-size: 16px; font-weight: bold; cursor: pointer; }
        button:active { background: #0056b3; }
        .korean-word { font-size:2.5rem; margin:20px 0; color: #333; font-weight: bold; }
        .feedback { margin-top:10px; font-weight:bold; min-height:24px; font-size: 18px; }
        .timer { font-weight:bold; margin:10px 0; font-size: 18px; color: #555; }
        .progress { width:100%; height:10px; background:#ddd; border-radius:5px; overflow:hidden; margin-bottom: 15px; }
        .progress-bar { height:10px; width:0%; background:#28a745; transition: width 0.3s ease; }
        h2 { color: #333; margin-top: 0; }
    </style>
</head>

<body>

<div class="quiz-box">

    <div id="setupScreen">
        <h2>KEEC13 Meaning Test</h2>
        <p>ဖြေဆိုမည့် မေးခွန်းအရေအတွက် ရွေးပါ</p>
        <input type="number" id="totalQuestionsInput" value="5" min="1" max="10">
        <button onclick="startQuiz()">စတင်ဖြေဆိုမည်</button>
    </div>

    <div id="quizScreen" style="display:none;">
        <div>မေးခွန်း: <span id="currentNum">1</span> / <span id="maxNum">5</span></div>
        
        <div class="timer">⏱ <span id="timer">10</span>s</div>
        
        <div class="progress">
            <div id="progressBar" class="progress-bar"></div>
        </div>
        
        <div class="korean-word" id="koreanWord"></div>
        
        <button onclick="replayAudio()" style="background:#0088cc; width:50%; margin:0 auto 15px auto; padding:8px; font-size:14px;">🔊 အသံပြန်ဖွင့်မည်</button>
        
        <input type="text" id="answerInput" placeholder="အဓိပ္ပာယ်ရိုက်ပါ" autocomplete="off">
        <button onclick="checkAnswer(false)">အဖြေစစ်မည်</button>
        
        <div id="feedback" class="feedback"></div>
    </div>

    <div id="resultScreen" style="display:none;">
        <h2>ပြီးဆုံး 🎉</h2>
        <p style="font-size: 20px;">ရမှတ်: <span id="finalScore" style="color:green; font-weight:bold;">0</span> / <span id="resultMaxNum">0</span></p>
        <button onclick="location.reload()">ပြန်ဖြေမည်</button>
    </div>

</div>

<script>
const database = [
    { q:"사과", a:"ပန်းသီး" }, { q:"물", a:"ရေ" }, { q:"학교", a:"ကျောင်း" },
    { q:"선생님", a:"ဆရာ" }, { q:"밥", a:"ထမင်း" }, { q:"우유", a:"နွားနို့" },
    { q:"고양이", a:"ကြောင်" }, { q:"개", a:"ခွေး" }, { q:"책", a:"စာအုပ်" },
    { q:"친구", a:"သူငယ်ချင်း" }
];

let quizList = [];
let currentIdx = 0;
let score = 0;
let timerInterval;
let timeLeft = 10;
let totalQuestions = 0;
let isAnswered = false; // ထပ်ခါထပ်ခါ နှိပ်မိခြင်းမှ ကာကွယ်ရန်

function startQuiz(){
    totalQuestions = parseInt(document.getElementById('totalQuestionsInput').value);
    // မေးခွန်းအရေအတွက် limit စစ်ဆေးခြင်း
    if(totalQuestions > database.length) totalQuestions = database.length;
    if(totalQuestions < 1) totalQuestions = 1;

    quizList = [...database].sort(()=>0.5-Math.random()).slice(0,totalQuestions);
    
    document.getElementById('maxNum').innerText = totalQuestions;
    document.getElementById('setupScreen').style.display='none';
    document.getElementById('quizScreen').style.display='block';
    
    loadQuestion();
}

// Android ဖုန်းများတွင် အသံသေချာထွက်စေရန် Web Speech API ကို အကောင်းဆုံးစနစ်ဖြင့် ပြင်ဆင်ခြင်း
function speak(text){
    if ('speechSynthesis' in window) {
        speechSynthesis.cancel(); // လတ်တလော အသံဟောင်းရှိက ဖျက်ပစ်ရန်
        let msg = new SpeechSynthesisUtterance(text);
        msg.lang = "ko-KR";
        msg.rate = 0.8; // စကားပြောနှုန်း အနည်းငယ် နှေးပေးထားခြင်း (နားထောင်ရ လွယ်ကူစေရန်)
        speechSynthesis.speak(msg);
    }
}

function replayAudio() {
    if(quizList[currentIdx]) {
        speak(quizList[currentIdx].q);
    }
}

function loadQuestion(){
    if(currentIdx >= quizList.length) return showResult();
    
    isAnswered = false; // ခလုတ်နှိပ်ခွင့် ပြန်ဖွင့်ပေးခြင်း
    let word = quizList[currentIdx].q;
    
    document.getElementById('koreanWord').innerText = word;
    document.getElementById('answerInput').value="";
    document.getElementById('currentNum').innerText = currentIdx + 1;
    document.getElementById('feedback').innerText="";
    
    updateProgress(); // မေးခွန်းအသစ်ရောက်တိုင်း Progress bar တန်းပြောင်းရန်
    speak(word);
    startTimer();
}

function startTimer(){
    clearInterval(timerInterval);
    timeLeft = 10;
    document.getElementById("timer").innerText = timeLeft;
    
    timerInterval = setInterval(()=>{
        timeLeft--;
        document.getElementById("timer").innerText = timeLeft;
        
        if(timeLeft <= 0){
            clearInterval(timerInterval);
            checkAnswer(true); // အချိန်ပြည့်သွားပါက အလိုအလျောက် အဖြေစစ်ရန်
        }
    }, 1000);
}

function checkAnswer(timeout = false){
    if(isAnswered) return; // အဖြေစစ်ပြီးသားဆိုလျှင် ဆက်မလုပ်ရန်
    isAnswered = true;
    clearInterval(timerInterval);
    
    let userInput = document.getElementById('answerInput').value.trim();
    let correct = quizList[currentIdx].a;
    let fb = document.getElementById('feedback');
    
    if(!timeout && userInput === correct){
        score++;
        fb.style.color="green";
        fb.innerText="✅ မှန်ကန်ပါသည်";
    } else if (timeout) {
        fb.style.color="orange";
        fb.innerText="⏱ အချိန်ပြည့်သွားပါပြီ! အဖြေမှန်မှာ: " + correct;
    } else {
        fb.style.color="red";
        fb.innerText="❌ မှားပါသည်! အဖြေမှန်မှာ: " + correct;
    }
    
    currentIdx++;
    // အဖြေမှန်/မှားကို ၁.၅ စက္ကန့် ပြသပြီးမှ နောက်မေးခွန်းသို့ သွားရန်
    setTimeout(loadQuestion, 1500);
}

function updateProgress(){
    let percent = (currentIdx / quizList.length) * 100;
    document.getElementById("progressBar").style.width = percent + "%";
}

function showResult(){
    document.getElementById('quizScreen').style.display='none';
    document.getElementById('resultScreen').style.display='block';
    document.getElementById('finalScore').innerText = score;
    document.getElementById('resultMaxNum').innerText = totalQuestions;
}

// Enter ခလုတ်နှိပ်လျှင်လည်း အဖြေစစ်ရန်
document.getElementById('answerInput').addEventListener("keyup", function(e){
    if(e.key === "Enter") checkAnswer(false);
});
</script>

</body>
</html>
