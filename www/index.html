<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Korean Vocabulary Type-in Quiz</title>

<style>
body { font-family: 'Pyidaungsu', sans-serif; background:#f0f2f5; display:flex; justify-content:center; padding:20px; }
.quiz-box { background:white; padding:30px; border-radius:15px; box-shadow:0 10px 25px rgba(0,0,0,0.1); width:100%; max-width:450px; text-align:center; border-top:5px solid #0088cc; }

input { width:80%; padding:12px; margin:15px 0; border:2px solid #ddd; border-radius:8px; text-align:center; }

button { background:#007bff; color:white; border:none; padding:12px; border-radius:8px; width:100%; margin-top:10px; }
.tg-btn { background:#0088cc; }

.korean-word { font-size:2.5rem; margin:20px 0; }
.feedback { margin-top:10px; font-weight:bold; min-height:24px; }

/* NEW */
.timer { font-weight:bold; margin:10px 0; }
.progress { width:100%; height:10px; background:#ddd; border-radius:5px; overflow:hidden; }
.progress-bar { height:10px; width:0; background:#28a745; }
</style>
</head>

<body>

<div class="quiz-box">

<div id="setupScreen">
<h>KEEC13 Meaning Test1</h> Test</h2>
<input type="number" id="totalQuestionsInput" value="5" min="1" max="10">
<button onclick="startQuiz()">စတင်ဖြေဆိုမည်</button>
</div>

<div id="quizScreen" style="display:none;">
<div>မေးခွန်း: <span id="currentNum">1</span> / <span id="maxNum">5</span></div>

<div class="timer">⏱ <span id="timer">10</span>s</div>

<div class="progress">
<div id="progressBar" class="progress-bar"></div>
</div>

<div class="korean-word" id="koreanWord"></div>

<input type="text" id="answerInput" placeholder="အဓိပ္ပာယ်ရိုက်ပါ">

<button onclick="checkAnswer()">အဖြေစစ်မည်</button>

<div id="feedback" class="feedback"></div>
</div>

<div id="resultScreen" style="display:none;">
<h2>ပြီးဆုံး 🎉</h2>
<p>Score: <span id="finalScore">0</span></p>
<button onclick="location.reload()">ပြန်ဖြေ</button>
</div>

</div>

<script>
const database = [
{ q:"사과", a:"ပန်းသီး" }, { q:"물", a:"ရေ" }, { q:"학교", a:"ကျောင်း" },
{ q:"선생님", a:"ဆရာ" }, { q:"밥", a:"ထမင်း" }, { q:"우유", a:"နွားနို့" },
{ q:"고양이", a:"ကြောင်" }, { q:"개", a:"ခွေး" }, { q:"책", a:"စာအုပ်" },
{ q:"친구", a:"သူငယ်ချင်း" }
];

let quizList = [];
let currentIdx = 0;
let score = 0;
let timer;
let timeLeft = 10;
let totalQuestions = 0;

function startQuiz(){
totalQuestions = parseInt(document.getElementById('totalQuestionsInput').value);

quizList = [...database].sort(()=>0.5-Math.random()).slice(0,totalQuestions);

document.getElementById('maxNum').innerText = totalQuestions;
document.getElementById('setupScreen').style.display='none';
document.getElementById('quizScreen').style.display='block';

loadQuestion();
}

function speak(text){
let msg = new SpeechSynthesisUtterance(text);
msg.lang="ko-KR";
speechSynthesis.speak(msg);
}

function loadQuestion(){
if(currentIdx >= quizList.length) return showResult();

let word = quizList[currentIdx].q;

document.getElementById('koreanWord').innerText = word;
document.getElementById('answerInput').value="";
document.getElementById('currentNum').innerText = currentIdx+1;
document.getElementById('feedback').innerText="";

speak(word);
startTimer();
}

function startTimer(){
clearInterval(timer);
timeLeft = 10;
document.getElementById("timer").innerText = timeLeft;

timer = setInterval(()=>{
timeLeft--;
document.getElementById("timer").innerText = timeLeft;

if(timeLeft<=0){
clearInterval(timer);
checkAnswer(true);
}
},1000);
}

function checkAnswer(timeout=false){
clearInterval(timer);

let userInput = document.getElementById('answerInput').value.trim();
let correct = quizList[currentIdx].a;
let fb = document.getElementById('feedback');

if(!timeout && userInput === correct){
score++;
fb.style.color="green";
fb.innerText="✅ မှန်";
}else{
fb.style.color="red";
fb.innerText="❌ "+correct;
}

updateProgress();

currentIdx++;
setTimeout(loadQuestion,1000);
}

function updateProgress(){
let percent = (currentIdx / quizList.length) * 100;
document.getElementById("progressBar").style.width = percent+"%";
}

function showResult(){
document.getElementById('quizScreen').style.display='none';
document.getElementById('resultScreen').style.display='block';
document.getElementById('finalScore').innerText=score;
}

document.getElementById('answerInput').addEventListener("keyup", function(e){
if(e.key==="Enter") checkAnswer();
});
</script>

</body>
</html>
