name: Build Android Signed APK (Capacitor)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Dependencies
      run: |
        npm install
        npx cap add android

    - name: Sync Capacitor to Android
      run: |
        npx cap sync android

    - name: Build Android Release APK
      run: |
        cd android
        # Google ပိတ်ခြင်းမှ ကင်းဝေးစေရန် တရားဝင် Release APK အဖြစ် ထုတ်ယူခြင်း
        ./gradlew assembleRelease

    - name: Sign Android APK (Google Play Protect ကျော်လွှားရန်)
      uses: r0adkll/sign-android-release@v1
      name: Sign app APK
      id: sign_app
      with:
        releaseDirectory: android/app/build/outputs/apk/release
        signingKeyBase64: ${{ secrets.SIGNING_KEY }}
        alias: ${{ secrets.ALIAS }}
        keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
        keyPassword: ${{ secrets.KEY_PASSWORD }}

    - name: Upload Signed APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: UBT-Shop-Official-APK
        path: ${{ steps.sign_app.outputs.signedReleaseFile }}
