name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 11 (Legacy SDK handling)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Buildozer and Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip autoconf automake libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev sqlite3 bzip2 libbz2-dev
        pip install --user --upgrade buildozer cython

    - name: Setup Tweak for Android SDK Licenses (Legacy)
      run: |
        mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
        # SDK ဗားရှင်းအဟောင်းများအတွက် တရားဝင် လိုင်စင်ကုဒ်များ ကြိုတင်ထည့်သွင်းခြင်း
        echo -e "24333f8a63b6825ea51551be33c004de2d8d3412\nd56f5187479451eabf01fb74313026e22e41e3d3\n8933bad161ad75d1d64353318097502d4cc5c08d" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
        echo -e "84831b9409646a918e30573bab4c9c91346d8abd" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license

    - name: Build with Buildozer
      run: |
        buildozer android debug
      env:
        ACCEPT_SDK_LICENSE: "y"

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: UBT-Shop-APK
        path: bin/*.apk
