name: Build Android APK (Capacitor)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # ခေတ်မီ Capacitor အတွက် Node 20 ကို သုံးခြင်း

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17' # Android SDK အတွက် စိတ်အချရဆုံး Java ဗားရှင်း

    - name: Install Dependencies
      run: |
        npm install
        # အကယ်၍ Web app ကို build လုပ်ရမည့် script (ဥပမာ npm run build) ရှိပါက အောက်က # ကို ဖြုတ်ပေးပါ
        # npm run build 

    - name: Sync Capacitor to Android
      run: |
        npx cap json
        npx cap sync android

    - name: Build Android App (Gradle)
      run: |
        cd android && ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: UBT-Shop-Capacitor-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
