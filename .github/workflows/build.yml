name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Buildozer and Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip autoconf automake libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev sqlite3 bzip2 libbz2-dev openjdk-17-jdk
        pip install --user --upgrade buildozer cython

    - name: Setup Android SDK Environment for Buildozer
      run: |
        # Buildozer သုံးမည့် Android SDK folder များကို ကြိုတင်တည်ဆောက်ခြင်း
        mkdir -p ~/.buildozer/android/platform/android-sdk/cmdline-tools
        mkdir -p ~/.buildozer/android/platform/android-sdk/licenses

        # Google ၏တရားဝင် cmdline-tools (sdkmanager ပါဝင်သော) ကို ရယူခြင်း
        wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline.zip
        unzip -q cmdline.zip -d ~/.buildozer/android/platform/android-sdk/cmdline-tools
        mv ~/.buildozer/android/platform/android-sdk/cmdline-tools/cmdline-tools ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest

        # Buildozer ရှာမည့် လမ်းကြောင်းဟောင်း (tools/bin) ဆီသို့ Link ချိတ်ပေးခြင်း
        mkdir -p ~/.buildozer/android/platform/android-sdk/tools
        ln -s ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin ~/.buildozer/android/platform/android-sdk/tools/bin

        # လိုင်စင်များ ကြိုတင်သဘောတူခြင်း
        echo -e "8933bad161ad75d1d64353318097502d4cc5c08d\n24333f8a63b6825ea51551be33c004de2d8d3412\nd56f5187479451eabf01fb74313026e22e41e3d3\n24333f8a63b6825ea51551be33c004de2d8d3412" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
        echo -e "84831b9409646a918e30573bab4c9c91346d8abd" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license

    - name: Build with Buildozer
      run: |
        buildozer android debug
      env:
        ACCEPT_SDK_LICENSE: "y"

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: UBT-Shop-APK
        path: bin/*.apk
