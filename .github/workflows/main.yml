name: HTML to APK (Final Success with Signing)
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Prepare Folder and Install Tools
        run: |
          mkdir -p www
          cp -r ./* www/ || true
          # ပိုလျှံသော Folder များကို ရှင်းလင်းခြင်း
          rm -rf www/.github www/android www/www || true
          npm install -g @ionic/cli
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Initialize and Build Android
        run: |
          # Project ကို www directory နဲ့ စတင်ခြင်း
          npx cap init KM com.kingeraser.myapp --web-dir www
          npx cap add android
          
          # Webview နှင့် Network Cleartext Traffic ခွင့်ပြုခြင်း
          sed -i 's/android:usesCleartextTraffic="false"/android:usesCleartextTraffic="true"/' android/app/src/main/AndroidManifest.xml
          
          # Capacitor Configuration ပြင်ဆင်ခြင်း
          echo '{"appId": "com.kingeraser.myapp", "appName": "KM", "webDir": "www", "server": {"allowNavigation": ["*"], "cleartext": true}}' > capacitor.config.json

          export JAVA_HOME=$JAVA_HOME_21_X64
          npx cap sync android
          
          # Play Protect Scan ဖတ်နိုင်ရန် Release Mode ဖြင့် တည်ဆောက်ခြင်း
          cd android && ./gradlew assembleRelease

      - name: Sign Android APK with Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          # ၁။ Keystore ဖိုင်ကို ပြန်လည်ထုတ်ယူခြင်း
          echo "$KEYSTORE_BASE64" | base64 --decode > release.jks
          
          # ၂။ Build Tools လမ်းကြောင်းကို Dynamic ရှာဖွေခြင်း (Error #11 ကို ဖြေရှင်းရန်)
          BUILD_TOOLS_PATH=$(ls -d $ANDROID_HOME/build-tools/* | tail -1)
          
          # ၃။ Gradle က ထုတ်ပေးလိုက်သော မူရင်း APK ကို ရှာဖွေခြင်း
          ORIGINAL_APK=$(find android/app/build/outputs/apk/release/ -name "*.apk" | head -n 1)
          
          # ၄။ Zipalign ပြုလုပ်ခြင်း
          $BUILD_TOOLS_PATH/zipalign -v 4 "$ORIGINAL_APK" KEEC13-km-app.apk
          
          # ၅။ Play Store စံနှုန်းမီ V1, V2, V3 Schemes များဖြင့် လက်မှတ်ထိုးခြင်း
          # ဒါမှသာ ဖုန်းမှာ Install လုပ်တဲ့အခါ Scan ဖတ်ဖို့ တောင်းဆိုမှာဖြစ်ပါတယ်
          $BUILD_TOOLS_PATH/apksigner sign --ks release.jks \
            --ks-pass pass:"$KEYSTORE_PASSWORD" \
            --ks-key-alias "$KEY_ALIAS" \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            KEEC13-km-app.apk
          
          echo "✅ Official Signed APK with V2/V3 schemes created!"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KEEC13-KM-Signed-APK
          path: KEEC13-km-app.apk
